<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>our journal 🤍</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&family=Petit+Formal+Script&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --rose: #f9c6d0; --rose-deep: #e8889a; --rose-mid: #f0a8b8;
  --rose-pale: #fdf0f3; --mauve: #c9a0b0; --cream: #fdf8f5;
  --text: #4a3040; --text-light: #8c6878;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --script: 'Petit Formal Script', cursive;
  --sans: 'DM Sans', sans-serif;
  --paper: #fffdf9;
  --ruled: rgba(200,160,180,0.12);
}
html { scroll-behavior: smooth; color-scheme: light only; }
body { font-family: var(--sans); background: var(--cream); color: var(--text); overflow-x: hidden; min-height: 100vh; }

#setup-screen {
position: fixed; inset: 0; z-index: 900;
background: var(–cream);
display: flex; flex-direction: column; align-items: center; justify-content: center;
text-align: center; padding: 2rem;
}
.setup-title { font-family: var(–script); font-size: clamp(3rem,10vw,6rem); color: var(–rose-deep); margin-bottom: 0.5rem; }
.setup-sub { font-family: var(–serif); font-size: 1.1rem; font-style: italic; color: var(–text-light); margin-bottom: 3rem; }
.setup-options { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 320px; }
.setup-btn {
background: white; border: 1px solid rgba(233,160,176,0.3); border-radius: 16px;
padding: 1.25rem 1.5rem; font-family: var(–serif); font-size: 1.1rem;
font-style: italic; color: var(–text); cursor: pointer; transition: all 0.2s;
text-align: left; display: flex; align-items: center; gap: 1rem;
}
.setup-btn:hover { border-color: var(–rose-deep); background: #fff5f7; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(200,100,130,0.1); }
.setup-btn-icon { font-size: 1.5rem; }
.setup-btn-desc { font-size: 0.8rem; color: var(–text-light); margin-top: 2px; font-style: normal; font-family: var(–sans); }
.setup-note { font-size: 11px; color: var(–mauve); margin-top: 2rem; font-style: italic; font-family: var(–serif); max-width: 300px; line-height: 1.6; }

nav {
position: fixed; top: 0; left: 0; right: 0; z-index: 200;
display: flex; justify-content: space-between; align-items: center;
padding: 0 2rem; height: 60px;
background: rgba(253,248,245,0.93); backdrop-filter: blur(16px);
border-bottom: 1px solid rgba(233,160,176,0.2);
}
.nav-logo { font-family: var(–script); font-size: 1.4rem; color: var(–rose-deep); }
.nav-right { display: flex; align-items: center; gap: 0.75rem; }
.nav-role-badge { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(–rose-deep); background: rgba(249,198,208,0.2); border: 1px solid rgba(233,160,176,0.3); border-radius: 999px; padding: 0.25rem 0.75rem; }
.nav-write-btn { background: var(–rose-deep); color: white; border: none; border-radius: 999px; padding: 0.4rem 1.25rem; font-family: var(–serif); font-size: 0.9rem; font-style: italic; cursor: pointer; transition: all 0.2s; }
.nav-write-btn:hover { background: var(–rose-mid); }

.section-tabs { display: flex; justify-content: center; gap: 0.5rem; padding: 1rem 2rem; margin-top: 60px; background: var(–cream); border-bottom: 1px solid rgba(233,160,176,0.15); flex-wrap: wrap; }
.tab-btn { font-family: var(–sans); font-size: 11px; letter-spacing: 0.1em; color: var(–text-light); padding: 0.4rem 1rem; border-radius: 999px; border: 1px solid transparent; transition: all 0.2s; cursor: pointer; background: none; }
.tab-btn:hover, .tab-btn.active { color: var(–rose-deep); border-color: rgba(233,160,176,0.45); background: rgba(249,198,208,0.18); }
.tab-btn.locked { opacity: 0.35; cursor: not-allowed; }

main { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }

.entries-list { display: flex; flex-direction: column; gap: 1.5rem; }
.entry-card {
background: var(–paper); border-radius: 4px; border: 1px solid rgba(233,160,176,0.2);
box-shadow: 0 2px 20px rgba(200,100,130,0.05); overflow: hidden; position: relative;
background-image: repeating-linear-gradient(transparent, transparent 31px, var(–ruled) 31px, var(–ruled) 32px);
background-position: 0 40px;
}
.entry-card::before { content: ‘’; position: absolute; left: 3rem; top: 0; bottom: 0; width: 1px; background: rgba(249,198,208,0.4); }
.entry-header { padding: 1.25rem 1.5rem 0.75rem 3.75rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
.entry-author { font-family: var(–script); font-size: 1.3rem; color: var(–rose-deep); }
.entry-date { font-size: 10px; letter-spacing: 0.15em; color: var(–mauve); text-transform: uppercase; }
.entry-body { padding: 0.5rem 1.5rem 1.5rem 3.75rem; font-family: var(–serif); font-size: 1.05rem; font-style: italic; color: var(–text); line-height: 2; white-space: pre-wrap; }
.entry-footer { padding: 0.75rem 1.5rem 1rem 3.75rem; border-top: 1px solid rgba(233,160,176,0.1); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
.entry-section-tag { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 999px; border: 1px solid rgba(233,160,176,0.3); color: var(–mauve); background: rgba(249,198,208,0.1); margin-right: 0.3rem; }
.entry-delete-btn { background: none; border: none; color: rgba(200,100,130,0.25); font-size: 13px; cursor: pointer; padding: 0.2rem 0.4rem; border-radius: 50%; transition: all 0.2s; }
.entry-delete-btn:hover { color: var(–rose-deep); background: rgba(249,198,208,0.2); }

.comments-section { padding: 0.75rem 1.5rem 1rem 3.75rem; border-top: 1px solid rgba(233,160,176,0.1); }
.comments-title { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(–mauve); margin-bottom: 0.75rem; }
.comment { margin-bottom: 0.75rem; }
.comment-text { font-family: var(–serif); font-size: 0.9rem; font-style: italic; color: var(–text-light); line-height: 1.6; display: block; }
.comment-meta { font-size: 9px; letter-spacing: 0.1em; color: var(–mauve); text-transform: uppercase; display: block; margin-top: 2px; }
.comment-form { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
.comment-input { flex: 1; min-width: 0; border: 1px solid rgba(233,160,176,0.25); border-radius: 10px; padding: 0.5rem 0.75rem; font-family: var(–serif); font-size: 0.9rem; font-style: italic; color: var(–text); background: #fff8fa; outline: none; transition: border 0.2s; }
.comment-input:focus { border-color: var(–rose-deep); }
.comment-submit { background: none; border: 1px solid rgba(233,160,176,0.35); border-radius: 10px; padding: 0.5rem 1rem; font-family: var(–serif); font-size: 0.85rem; font-style: italic; color: var(–rose-deep); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.comment-submit:hover { background: rgba(249,198,208,0.15); }

.empty-state { text-align: center; padding: 4rem 2rem; }
.empty-state p { font-family: var(–serif); font-size: 1.1rem; font-style: italic; color: var(–mauve); line-height: 1.8; }
.loading {
text-align: center; padding: 4rem 2rem;
display: flex; flex-direction: column; align-items: center; gap: 1.25rem;
}
.loading-spinner {
width: 36px; height: 36px; border-radius: 50%;
border: 2px solid rgba(233,160,176,0.2);
border-top-color: var(–rose-deep);
animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: var(–serif); font-style: italic; color: var(–mauve); font-size: 1rem; }

#write-modal {
position: fixed; inset: 0; z-index: 400;
background: rgba(253,240,243,0.97); backdrop-filter: blur(12px);
display: none; flex-direction: column; align-items: center;
padding: 80px 1.5rem 2rem; overflow-y: auto;
}
#write-modal.show { display: flex; animation: modalIn 0.35s ease both; }
@keyframes modalIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.write-wrap { max-width: 680px; width: 100%; }
.write-paper {
background: var(–paper); border-radius: 4px; border: 1px solid rgba(233,160,176,0.2);
box-shadow: 0 8px 60px rgba(200,100,130,0.08); padding: 3rem 3rem 2rem 4.5rem; position: relative;
background-image: repeating-linear-gradient(transparent, transparent 31px, var(–ruled) 31px, var(–ruled) 32px);
background-position: 0 50px;
}
.write-paper::before { content: ‘’; position: absolute; left: 3rem; top: 0; bottom: 0; width: 1px; background: rgba(249,198,208,0.5); }
.write-date { font-size: 10px; letter-spacing: 0.2em; color: var(–mauve); text-transform: uppercase; margin-bottom: 1.5rem; }
.write-textarea { width: 100%; min-height: 300px; border: none; resize: none; background: transparent; font-family: var(–serif); font-size: 1.05rem; font-style: italic; color: var(–text); line-height: 2; outline: none; }
.write-textarea::placeholder { color: rgba(201,160,176,0.5); }
.write-actions { margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: flex-end; }
.write-cancel { background: none; border: none; font-family: var(–serif); font-size: 0.95rem; font-style: italic; color: var(–mauve); cursor: pointer; padding: 0.5rem 1rem; transition: color 0.2s; }
.write-cancel:hover { color: var(–rose-deep); }
.write-save { background: var(–rose-deep); color: white; border: none; border-radius: 999px; padding: 0.6rem 1.75rem; font-family: var(–serif); font-size: 1rem; font-style: italic; cursor: pointer; transition: all 0.2s; }
.write-save:hover { background: var(–rose-mid); }

#saveto-modal {
position: fixed; inset: 0; z-index: 500;
background: rgba(253,240,243,0.97); backdrop-filter: blur(12px);
display: none; flex-direction: column; align-items: center; justify-content: center;
padding: 2rem; text-align: center;
}
#saveto-modal.show { display: flex; animation: modalIn 0.3s ease both; }
.saveto-title { font-family: var(–serif); font-size: 1.6rem; font-weight: 300; color: var(–text); margin-bottom: 0.5rem; }
.saveto-title em { font-style: italic; color: var(–rose-deep); }
.saveto-sub { font-family: var(–serif); font-size: 0.95rem; font-style: italic; color: var(–text-light); margin-bottom: 2rem; }
.saveto-options { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; max-width: 340px; margin-bottom: 1.5rem; }
.saveto-option { display: flex; align-items: center; gap: 1rem; background: white; border: 1px solid rgba(233,160,176,0.2); border-radius: 14px; padding: 1rem 1.25rem; cursor: pointer; transition: all 0.2s; text-align: left; }
.saveto-option:hover { border-color: rgba(233,160,176,0.4); background: #fff5f7; }
.saveto-option.selected { border-color: var(–rose-deep); background: rgba(249,198,208,0.1); }
.saveto-option input[type=checkbox] { accent-color: var(–rose-deep); width: 16px; height: 16px; flex-shrink: 0; }
.saveto-option-label { font-family: var(–serif); font-size: 1rem; font-style: italic; color: var(–text); }
.saveto-option-desc { font-size: 11px; color: var(–text-light); margin-top: 2px; font-family: var(–sans); }
.saveto-confirm { background: var(–rose-deep); color: white; border: none; border-radius: 999px; padding: 0.6rem 2rem; font-family: var(–serif); font-size: 1rem; font-style: italic; cursor: pointer; transition: all 0.2s; }
.saveto-confirm:hover { background: var(–rose-mid); }
.saveto-back { background: none; border: none; font-family: var(–serif); font-size: 0.9rem; font-style: italic; color: var(–mauve); cursor: pointer; margin-top: 0.75rem; transition: color 0.2s; display: block; }
.saveto-back:hover { color: var(–rose-deep); }

#toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(–text); color: white; border-radius: 999px; padding: 0.6rem 1.5rem; font-family: var(–serif); font-size: 0.95rem; font-style: italic; z-index: 999; transition: transform 0.3s ease; pointer-events: none; }
#toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width:600px) {
.write-paper { padding: 2rem 1.25rem 1.5rem 2.5rem; }
.write-paper::before { left: 1.75rem; }
.entry-card::before { left: 2rem; }
.entry-header, .entry-body, .entry-footer, .comments-section { padding-left: 2.75rem; }
nav { padding: 0 1rem; }
}
</style>

</head>
<body>

<div id="setup-screen">
  <p class="setup-title">our journal</p>
  <p class="setup-sub">who's reading today?</p>
  <div class="setup-options">
    <button class="setup-btn" data-role="mete">
      <span class="setup-btn-icon">🤍</span>
      <div><div style="font-weight:400">mete</div><div class="setup-btn-desc">full access, all sections</div></div>
    </button>
    <button class="setup-btn" data-role="hoshiro">
      <span class="setup-btn-icon">🤍</span>
      <div><div style="font-weight:400">hoshiro</div><div class="setup-btn-desc">full access, all sections</div></div>
    </button>
    <button class="setup-btn" data-role="guest">
      <span class="setup-btn-icon">🤍</span>
      <div><div style="font-weight:400">just a visitor</div><div class="setup-btn-desc">public entries and comments only</div></div>
    </button>
  </div>
  <p class="setup-note">this gets saved to your device, you won't be asked again 🤍</p>
</div>

<nav id="main-nav" style="display:none">
  <span class="nav-logo">our journal</span>
  <div class="nav-right">
    <span class="nav-role-badge" id="roleBadge"></span>
    <button class="nav-write-btn" id="writeBtn" style="display:none">+ new entry</button>
  </div>
</nav>

<div class="section-tabs" id="mainTabs" style="display:none">
  <button class="tab-btn active" data-tab="public">public 🌸</button>
  <button class="tab-btn" data-tab="us" id="tabUs">just us 🤍</button>
  <button class="tab-btn" data-tab="private" id="tabPrivate">only me 🔒</button>
</div>

<main id="mainContent" style="display:none">
  <div id="entriesContainer"><div class="loading">loading entries...</div></div>
</main>

<div id="write-modal">
  <div class="write-wrap">
    <div class="write-paper">
      <p class="write-date" id="writeDate"></p>
      <textarea class="write-textarea" id="writeArea" placeholder="write something..."></textarea>
    </div>
    <div class="write-actions">
      <button class="write-cancel" id="writeCancel">cancel</button>
      <button class="write-save" id="writeSave">done 🤍</button>
    </div>
  </div>
</div>

<div id="saveto-modal">
  <p class="saveto-title">save <em>where?</em></p>
  <p class="saveto-sub">pick as many as you want</p>
  <div class="saveto-options">
    <label class="saveto-option" id="opt-public">
      <input type="checkbox" value="public">
      <div><div class="saveto-option-label">public</div><div class="saveto-option-desc">everyone can read this</div></div>
    </label>
    <label class="saveto-option" id="opt-us">
      <input type="checkbox" value="us">
      <div><div class="saveto-option-label">just us</div><div class="saveto-option-desc">only you and hoshiro</div></div>
    </label>
    <label class="saveto-option" id="opt-private">
      <input type="checkbox" value="private">
      <div><div class="saveto-option-label">only me</div><div class="saveto-option-desc">nobody else sees this</div></div>
    </label>
  </div>
  <button class="saveto-confirm" id="savetoConfirm">save it 🤍</button>
  <button class="saveto-back" id="savetoBack">go back</button>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, deleteDoc, doc, query, where, orderBy, onSnapshot, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAoItaRl_crhVCONAMdPPXT3aMtVobKZxo",
  authDomain: "mete-hoshiro-journal.firebaseapp.com",
  projectId: "mete-hoshiro-journal",
  storageBucket: "mete-hoshiro-journal.firebasestorage.app",
  messagingSenderId: "188525303467",
  appId: "1:188525303467:web:6deacc494c3411523089ee"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let role = localStorage.getItem('journal_role');
let currentTab = 'public';
let pendingEntryText = '';
let unsubscribe = null;

const loadingPhrases = {
  mete: [
    "loading the most swaggest guy to ever do it bro it's not even close...",
    "fetching him. THE him. mete dogan. look him up.",
    "loading the goat fr fr. built a whole website for love at 1am and would do it again no cap.",
    "loading the baddest mf in every room he's ever walked into. ngl.",
    "fetching mete rn, wakes up and chooses to be that girl every day. effortlessly. its giving.",
    "loading the CEO of being down bad but making it look cool as hell somehow lmao.",
    "fetching the guy who types at 1am with unmatched energy and ALWAYS wins. always.",
    "loading the only person who could make smth this hard look this easy. icon behavior ngl.",
    "loading mete. certified built different. they broke the mold bro.",
    "fetching the realest, most that guy, no notes, no complaints, no competition. js facts.",
  ],
  hoshiro: [
    "loading someone so loved it's actually insane...",
    "fetching the person mete smiles about at 1am for no reason...",
    "preparing a space made just for you 🤍...",
    "loading the one mete would do literally anything for. and has.",
    "fetching you. just you. that's enough. that's everything.",
    "loading hoshiro, who is so so so loved and deserves to know it.",
    "preparing a place that exists because of you, for you, always.",
    "fetching the person who made mete's whole world make sense.",
    "loading someone who is thought about way more than they probably realize...",
    "preparing your space, hoshiro. you belong here 🤍",
  ],
  guest: [
    "loading... why are you here lmaooo...",
    "fetching entries for the nosiest person alive...",
    "preparing... this ain't for you but we love you anyway...",
    "loading... we see you we see you...",
    "fetching... twin you are so curious and we respect it actually...",
    "loading... okay twin you did not have to click this but here you are...",
    "preparing... you're not mete or hoshiro but you showed up anyway. respect.",
    "fetching... the audacity. the curiosity. the nerve. we love it.",
    "loading... BOO HOO THE WEBSITES FOR REJU CRY ABOUT IT...",
    "preparing... just know you're about to witness something really cute and it's not yours 😭",
  ],
};

function getLoadingPhrase(r) {
  const pool = loadingPhrases[r] || loadingPhrases.guest;
  return pool[Math.floor(Math.random() * pool.length)];
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

function canWrite() { return role === 'mete' || role === 'hoshiro'; }
function canSeeUs() { return role === 'mete' || role === 'hoshiro'; }

function initUI() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('main-nav').style.display = 'flex';
  document.getElementById('mainTabs').style.display = 'flex';
  document.getElementById('mainContent').style.display = 'block';
  document.getElementById('roleBadge').textContent = role;
  if (canWrite()) document.getElementById('writeBtn').style.display = 'block';
  if (!canSeeUs()) { document.getElementById('tabUs').classList.add('locked'); document.getElementById('tabPrivate').classList.add('locked'); }
  loadTab('public');
}

if (role) { initUI(); }
else {
  // hide roles already taken by other devices
  const takenRoles = JSON.parse(localStorage.getItem('taken_roles') || '[]');
  takenRoles.forEach(r => {
    const btn = document.querySelector(`.setup-btn[data-role="${r}"]`);
    if (btn) btn.style.display = 'none';
  });

  document.querySelectorAll('.setup-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      role = btn.dataset.role;
      localStorage.setItem('journal_role', role);
      // mark this role as taken for other devices on this browser
      const taken = JSON.parse(localStorage.getItem('taken_roles') || '[]');
      if (!taken.includes(role)) { taken.push(role); localStorage.setItem('taken_roles', JSON.stringify(taken)); }
      initUI();
    });
  });
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    if ((tab === 'us' || tab === 'private') && !canSeeUs()) { toast('this section is private 🔒'); return; }
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = tab;
    loadTab(tab);
  });
});

function loadTab(tab) {
  const container = document.getElementById('entriesContainer');
  container.innerHTML = `<div class="loading"><div class="loading-spinner"></div><p class="loading-text">${getLoadingPhrase(role)}</p></div>`;
  if (unsubscribe) unsubscribe();

  let q;
  if (tab === 'private') {
    q = query(collection(db, 'entries'), where('section', '==', 'private'), where('author', '==', role), orderBy('createdAt', 'desc'));
  } else {
    q = query(collection(db, 'entries'), where('section', '==', tab), orderBy('createdAt', 'desc'));
  }

  unsubscribe = onSnapshot(q, (snapshot) => {
    container.innerHTML = '';
    if (snapshot.empty) {
      container.innerHTML = '<div class="empty-state"><p>nothing here yet 🤍<br>be the first to write something</p></div>';
      return;
    }
    const list = document.createElement('div');
    list.className = 'entries-list';
    snapshot.forEach(docSnap => list.appendChild(renderEntry(docSnap.data(), docSnap.id, tab)));
    container.appendChild(list);
  });
}

function renderEntry(entry, id, tab) {
  const card = document.createElement('div');
  card.className = 'entry-card';
  const canDelete = role === entry.author || role === 'mete';
  const sections = entry.sections || [tab];

  const commentsHtml = tab === 'public' ? `
    <div class="comments-section">
      <p class="comments-title">reactions</p>
      ${(entry.comments||[]).length === 0 ? '<p style="font-family:var(--serif);font-size:0.85rem;font-style:italic;color:var(--mauve)">no reactions yet 🤍</p>' : ''}
      ${(entry.comments||[]).map(c => `
        <div class="comment">
          <span class="comment-text">${c.text}</span>
          <span class="comment-meta">${c.author} · ${new Date(c.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span>
        </div>`).join('')}
      <div class="comment-form">
        <input class="comment-input" placeholder="leave a reaction..." maxlength="200">
        <button class="comment-submit">send 🤍</button>
      </div>
    </div>` : '';

  card.innerHTML = `
    <div class="entry-header">
      <span class="entry-author">${entry.author}</span>
      <div style="display:flex;align-items:center;gap:0.75rem">
        <span class="entry-date">${formatDate(entry.createdAt)}</span>
        ${canDelete ? `<button class="entry-delete-btn" data-id="${id}">✕</button>` : ''}
      </div>
    </div>
    <div class="entry-body">${entry.text}</div>
    <div class="entry-footer">
      <div>${sections.map(s=>`<span class="entry-section-tag">${s}</span>`).join('')}</div>
    </div>
    ${commentsHtml}
  `;

  if (canDelete) {
    card.querySelector('.entry-delete-btn')?.addEventListener('click', async () => {
      if (confirm('delete this entry?')) { await deleteDoc(doc(db,'entries',id)); toast('deleted'); }
    });
  }

  card.querySelector('.comment-submit')?.addEventListener('click', async () => {
    const input = card.querySelector('.comment-input');
    const text = input.value.trim();
    if (!text) return;
    const entryRef = doc(db,'entries',id);
    const comments = [...(entry.comments||[]), { text, author: role||'visitor', date: new Date().toISOString() }];
    await updateDoc(entryRef, { comments });
    input.value = '';
    toast('reaction added 🤍');
  });

  return card;
}

document.getElementById('writeBtn')?.addEventListener('click', () => {
  const now = new Date();
  document.getElementById('writeDate').textContent = now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('writeArea').value = '';
  document.getElementById('write-modal').classList.add('show');
});

document.getElementById('writeCancel')?.addEventListener('click', () => document.getElementById('write-modal').classList.remove('show'));

document.getElementById('writeSave')?.addEventListener('click', () => {
  const text = document.getElementById('writeArea').value.trim();
  if (!text) { toast('write something first 🤍'); return; }
  pendingEntryText = text;
  document.getElementById('write-modal').classList.remove('show');
  document.querySelectorAll('.saveto-option input').forEach(cb => cb.checked = false);
  document.querySelectorAll('.saveto-option').forEach(o => o.classList.remove('selected'));
  if (!canSeeUs()) document.getElementById('opt-us').style.display = 'none';
  document.getElementById('saveto-modal').classList.add('show');
});

document.querySelectorAll('.saveto-option').forEach(opt => {
  opt.addEventListener('click', () => {
    const cb = opt.querySelector('input');
    setTimeout(() => opt.classList.toggle('selected', cb.checked), 0);
  });
});

document.getElementById('savetoBack')?.addEventListener('click', () => {
  document.getElementById('saveto-modal').classList.remove('show');
  document.getElementById('write-modal').classList.add('show');
});

document.getElementById('savetoConfirm')?.addEventListener('click', async () => {
  const selected = [...document.querySelectorAll('.saveto-option input:checked')].map(cb => cb.value);
  if (!selected.length) { toast('pick at least one section 🤍'); return; }
  const btn = document.getElementById('savetoConfirm');
  btn.textContent = 'saving...';
  for (const section of selected) {
    await addDoc(collection(db,'entries'), {
      text: pendingEntryText, author: role, section, sections: selected,
      createdAt: serverTimestamp(), comments: [],
    });
  }
  document.getElementById('saveto-modal').classList.remove('show');
  btn.textContent = 'save it 🤍';
  toast('saved 🤍');
  loadTab(currentTab);
});

// SECRET METE CODE - 10 taps on nav logo
let secretTaps = 0;
let secretTimer = null;
const SECRET_CODE = 'Bmd694205048!';
document.querySelector('.nav-logo')?.addEventListener('click', ()=>{
  secretTaps++;
  clearTimeout(secretTimer);
  secretTimer = setTimeout(() => secretTaps = 0, 3000);
  if(secretTaps >= 10) {
    secretTaps = 0;
    const code = prompt('🤍');
    if(code === SECRET_CODE) {
      localStorage.setItem('journal_role', 'mete');
      alert('welcome back mete 🤍');
      location.reload();
    }
  }
});
</script>
